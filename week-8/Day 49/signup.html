<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="container">
  <h1>CREATE ACCOUNT</h1>

  <form id="signup-form">
    <div class="tbox">
      <input id="new-uname" type="text" placeholder="Username" required>
    </div>

    <div class="tbox">
      <input id="new-pwd" type="password" placeholder="Password" required>
    </div>

    <input class="btn" type="submit" value="SIGN UP">
  </form>

  <a class="b1" href="login.html">BACK TO LOGIN</a>
</div>

<script src="js/signup.js"></script>
</body>
</html>
