<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position in CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box static">Static (default position)</div>

<div class="box relative">Relative (moves from normal position)</div>

<div class="container">
  Container for absolute positioning
  <div class="box absolute">Absolute (inside container)</div>
</div>

<div class="box sticky">Sticky (sticks on scroll)</div>

<div class="box fixed">Fixed (always bottom-right)</div>

<p>Scroll down to see sticky and fixed behavior.</p>

</body>
</html>
