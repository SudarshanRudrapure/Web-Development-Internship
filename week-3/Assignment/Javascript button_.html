<!DOCTYPE html>
<html>
<head>

<title>Interactive Web Page</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background-color:#f4f4f4;
}

.container{
margin-top:100px;
}

button{
padding:10px 20px;
font-size:16px;
background-color:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:darkblue;
}

</style>

</head>

<body>

<div class="container">

<h1>Interactive Web Page</h1>

<p id="message">Click the button to change this text.</p>

<button onclick="changeText()">Click Me</button>

</div>

<script>

function changeText(){

document.getElementById("message").innerHTML =
"🎉 You clicked the button! JavaScript changed this text.";

}

</script>

</body>
</html>
