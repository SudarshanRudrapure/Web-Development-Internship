<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Comment Example</h2>

<script>

// This is a single-line comment
alert("Welcome to JavaScript");

/* This is a
   multi-line comment
   explaining the code below */

let userName = "Sdr";
alert("Hello " + userName);

</script>

</body>
</html>

<!-- Explanation:

// is used for a single-line comment.

/* ... */ is used for a multi-line comment. -->
